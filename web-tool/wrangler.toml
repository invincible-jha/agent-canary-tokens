# Cloudflare Worker configuration for the "Is My Data in AI?" canary tool.
# See docs/web-tool.md for deployment instructions.

name = "aumos-canary"
main = "worker.ts"
compatibility_date = "2024-01-01"

# Workers KV namespace for storing canary token records.
# Replace the placeholder ID with your actual KV namespace ID
# after running: wrangler kv:namespace create "CANARY_TOKENS"
[[kv_namespaces]]
binding = "CANARY_TOKENS"
id = "placeholder_id"

[build]
command = ""

[vars]
ENVIRONMENT = "production"
